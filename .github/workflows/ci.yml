name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-build-and-test:
    name: C++ Build + Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            g++-11 \
            libyaml-cpp-dev \
            libsqlite3-dev \
            libcurl4-openssl-dev \
            nlohmann-json3-dev

      - name: Configure CMake
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release \
                   -DBUILD_PYTHON_BINDINGS=OFF \
                   -DBUILD_TESTING=ON

      - name: Build C++
        run: |
          cd build
          cmake --build . --parallel $(nproc)

      - name: Run C++ tests
        run: |
          cd build && ctest -j$(nproc) --output-on-failure

  python-tests:
    name: Python Tests
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          pip install flask flask-cors pybind11 pytest

      - name: Run Python tests (without C++ bindings)
        run: |
          cd tests
          python -m pytest test_core_python.py test_aan.py -v \
            --ignore-glob='*cpp*' \
            -k "not cpp_binding"

  linter:
    name: Lint Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: |
          pip install pyflakes

      - name: Python syntax check
        run: |
          find python_interface/ -name '*.py' -exec python -m py_compile {} \;
